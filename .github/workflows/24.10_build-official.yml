name: Build OpenWrt 24.10 Official

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

permissions:
  contents: write

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-24.10
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    # 安装编译依赖
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential clang flex bison g++ gawk gcc-multilib gettext \
          git libncurses-dev libssl-dev python3-pip python3-setuptools \
          rsync swig unzip zlib1g-dev file wget xsltproc \
          ecj java-propose-classpath libelf-dev libfuse-dev libjson-c-dev \
          liblzo2-dev liblzma-dev libzstd-dev quilt u-boot-tools \
          python3-dev python3-pyelftools python3-yaml ccache \
          aria2 curl subversion \
          libdbus-1-dev libexpat1-dev libglib2.0-dev \
          bash-completion
        sudo apt-get clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    # 克隆OpenWrt源码
    - name: Clone source code
      working-directory: /workdir
      run: |
        git clone -b ${{ env.REPO_BRANCH }} --single-branch --depth 1 ${{ env.REPO_URL }} openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    # 缓存下载文件
    - name: Cache OpenWrt dl (downloads)
      uses: actions/cache@v4
      with:
        path: /workdir/openwrt/dl
        key: openwrt-dl-24.10-${{ hashFiles('24.10_diy-part1.sh') }}-${{ github.run_id }}
        restore-keys: |
          openwrt-dl-24.10-${{ hashFiles('24.10_diy-part1.sh') }}-
          openwrt-dl-24.10-

    # 配置第三方feeds源
    - name: Load custom feeds
      run: |
        chmod +x 24.10_diy-part1.sh
        cd openwrt
        $GITHUB_WORKSPACE/24.10_diy-part1.sh

    # 缓存编译目录
    - name: Cache OpenWrt build (staging_dir)
      uses: actions/cache@v4
      with:
        path: |
          /workdir/openwrt/staging_dir
          /workdir/openwrt/build_dir
        key: openwrt-build-24.10-${{ hashFiles('24.10_config.txt') }}-${{ github.run_id }}
        restore-keys: |
          openwrt-build-24.10-${{ hashFiles('24.10_config.txt') }}-
          openwrt-build-24.10-

    # 更新feeds
    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    # 安装feeds
    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    # 加载自定义配置
    - name: Load custom configuration
      run: |
        [ -e 24.10_config.txt ] && cp 24.10_config.txt openwrt/.config
        chmod +x 24.10_diy-part2.sh
        cd openwrt
        $GITHUB_WORKSPACE/24.10_diy-part2.sh

    # 验证自定义配置
    - name: Verify custom configuration
      run: |
        cd openwrt
        echo "=== 自定义配置验证 ==="
        echo ""
        echo "--- CUPS中文包检查 ---"
        test -f package/base-files/files/etc/cups-zh/CUPS-zh.zip && echo "OK: CUPS-zh.zip 已复制到固件 ($(du -h package/base-files/files/etc/cups-zh/CUPS-zh.zip | cut -f1))" || echo "FAIL: CUPS-zh.zip 未找到"
        echo ""
        echo "--- uci-defaults脚本 ---"
        test -f package/base-files/files/etc/uci-defaults/97-timecontrol-menu && echo "OK: timecontrol菜单修复脚本存在" || echo "FAIL: timecontrol菜单修复脚本不存在"
        test -f package/base-files/files/etc/uci-defaults/98-cups-zh-cn && echo "OK: CUPS脚本存在" || echo "FAIL: CUPS脚本不存在"
        test -f package/base-files/files/etc/uci-defaults/99-grub-timeout && echo "OK: GRUB脚本存在" || echo "FAIL: GRUB脚本不存在"
        echo ""
        echo "--- uci-defaults脚本内容检查 ---"
        head -3 package/base-files/files/etc/uci-defaults/97-timecontrol-menu 2>/dev/null
        head -3 package/base-files/files/etc/uci-defaults/98-cups-zh-cn 2>/dev/null
        head -3 package/base-files/files/etc/uci-defaults/99-grub-timeout 2>/dev/null
        echo ""
        echo "--- base-files/files/etc/ 目录内容 ---"
        ls -laR package/base-files/files/etc/cups-zh/ 2>/dev/null
        echo ""
        ls -la package/base-files/files/etc/uci-defaults/ 2>/dev/null

    # SSH调试（可选）
    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: github.event.inputs.ssh == 'true'

    # 清理Tailscale缓存
    - name: Clean Go mod cache
      run: |
        cd openwrt
        rm -rf dl/go-mod-cache
        make package/tailscale/clean 2>/dev/null || true

    # 下载源码包 + defconfig
    - name: Download package
      run: |
        cd openwrt
        make defconfig
        # 强制禁用dnsmasq，使用dnsmasq-full（解决冲突）
        sed -i 's/CONFIG_PACKAGE_dnsmasq=y/# CONFIG_PACKAGE_dnsmasq is not set/' .config
        sed -i 's/CONFIG_PACKAGE_dnsmasq=m/# CONFIG_PACKAGE_dnsmasq is not set/' .config
        # 强制禁用旧版iptables fullconenat（24.10 fw4不兼容）
        sed -i 's/CONFIG_PACKAGE_kmod-fullconenat=y/# CONFIG_PACKAGE_kmod-fullconenat is not set/' .config
        sed -i 's/CONFIG_PACKAGE_kmod-fullconenat=m/# CONFIG_PACKAGE_kmod-fullconenat is not set/' .config
        sed -i 's/CONFIG_PACKAGE_iptables-mod-fullconenat=y/# CONFIG_PACKAGE_iptables-mod-fullconenat is not set/' .config
        sed -i 's/CONFIG_PACKAGE_iptables-mod-fullconenat=m/# CONFIG_PACKAGE_iptables-mod-fullconenat is not set/' .config
        sed -i 's/CONFIG_PACKAGE_luci-app-fullconenat=y/# CONFIG_PACKAGE_luci-app-fullconenat is not set/' .config
        sed -i 's/CONFIG_PACKAGE_luci-app-fullconenat=m/# CONFIG_PACKAGE_luci-app-fullconenat is not set/' .config
        # 强制禁用IPv6 NAT（24.10 fw4不兼容）
        sed -i 's/CONFIG_PACKAGE_kmod-ipt-nat6=y/# CONFIG_PACKAGE_kmod-ipt-nat6 is not set/' .config
        sed -i 's/CONFIG_PACKAGE_kmod-ipt-nat6=m/# CONFIG_PACKAGE_kmod-ipt-nat6 is not set/' .config
        # 强制设置GRUB等待时间为2秒
        sed -i 's/CONFIG_GRUB_TIMEOUT=.*/CONFIG_GRUB_TIMEOUT=2/' .config
        make defconfig
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    # 编译固件
    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 || make -j1 V=s | tee build.log
        echo "status=success" >> "$GITHUB_OUTPUT"
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> "$GITHUB_ENV"
        echo "FILE_DATE=_$(date +%Y%m%d%H%M)" >> "$GITHUB_ENV"

    # 整理固件文件
    - name: Organize firmware files
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt
        mkdir -p release
        # 复制固件文件
        cp bin/targets/x86/64/*.{img.gz,sha256sums} release/ 2>/dev/null || true
        # 复制其他文件
        cp -r bin/targets/x86/64/packages release/ 2>/dev/null || true
        # 生成版本信息
        echo "OpenWrt 24.10 Official Stable Build" > release/build_info.txt
        echo "Build Date: $(date '+%Y-%m-%d %H:%M:%S')" >> release/build_info.txt
        echo "Target: x86_64" >> release/build_info.txt
        echo "Features: CUPS+Avahi+WireGuard+pbr+Tailscale+ACME+frp+timecontrol+nft-fullcone" >> release/build_info.txt

    # 验证固件中是否包含 uci-defaults 脚本
    - name: Verify uci-defaults in firmware
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt
        echo "=== 验证固件中的 uci-defaults ==="
        ROOTFS_IMG=$(ls bin/targets/x86/64/openwrt-x86-64-generic-squashfs-rootfs.img 2>/dev/null | head -1)
        if [ -n "$ROOTFS_IMG" ]; then
          echo "根文件系统: $ROOTFS_IMG"
          echo ""
          echo "--- 检查 base-files 包中的 uci-defaults ---"
          # base-files 编译产物在 staging_dir 中
          BASE_FILES_IPK=$(find staging_dir -name "base-files_*.ipk" 2>/dev/null | head -1)
          if [ -n "$BASE_FILES_IPK" ]; then
            echo "base-files 包: $BASE_FILES_IPK"
            # 用 tar 检查 ipk 内容
            tar -tzf "$BASE_FILES_IPK" 2>/dev/null | grep "uci-defaults" | sort
            echo ""
            tar -tzf "$BASE_FILES_IPK" 2>/dev/null | grep "98-cups-zh-cn" && echo "OK: CUPS脚本已打包进base-files" || echo "FAIL: CUPS脚本未打包"
            tar -tzf "$BASE_FILES_IPK" 2>/dev/null | grep "99-grub-timeout" && echo "OK: GRUB脚本已打包进base-files" || echo "FAIL: GRUB脚本未打包"
            tar -tzf "$BASE_FILES_IPK" 2>/dev/null | grep "97-timecontrol-menu" && echo "OK: timecontrol菜单修复脚本已打包进base-files" || echo "FAIL: timecontrol菜单修复脚本未打包"
            tar -tzf "$BASE_FILES_IPK" 2>/dev/null | grep "cups-zh" && echo "OK: CUPS-zh.zip已打包进base-files" || echo "FAIL: CUPS-zh.zip未打包"
          else
            echo "未找到 base-files ipk，检查 staging_dir..."
            find staging_dir -path "*/base-files/etc/uci-defaults/*" 2>/dev/null | sort
          fi
        else
          echo "未找到 rootfs 镜像，跳过验证"
        fi

    # 上传固件到 GitHub Release
    - name: Upload to GitHub Release
      if: steps.compile.outputs.status == 'success'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v24.10-${{ env.FILE_DATE }}
        name: OpenWrt 24.10 Stable ${{ env.FILE_DATE }}
        body: |
          ## OpenWrt 24.10 Official Stable Build
          
          **构建时间**: ${{ env.FILE_DATE }}
          
          ### 功能特性
          - CUPS 打印服务 + Avahi 网络发现 + 中文界面
          - Full Cone NAT (nftables版, kmod-nft-fullcone)
          - WireGuard VPN + pbr 策略路由
          - Tailscale 内网穿透
          - ACME 自动证书
          - frp 内网穿透
          - timecontrol 上网时间控制
          - ksmbd 文件共享
          - DDNS 动态域名
          - 广告屏蔽 + 性能监控
          
          ### 使用说明
          1. 写入 img.gz 到磁盘（或解压后写入）
          2. 默认 IP: 192.168.1.1
          3. 默认用户名: root，无密码
        files: openwrt/release/*
        draft: false
        prerelease: false

    # 同时上传到 Artifact（备用）
    - name: Upload firmware artifact
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_24.10_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin/targets/*/*
