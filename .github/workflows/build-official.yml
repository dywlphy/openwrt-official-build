# ============================================================
# OpenWrt 官方 24.10 稳定版编译
# 核心：CUPS + SSR-Plus + ksmbd
# 三层快速失败检查（5分钟内发现配置/下载问题）
# ============================================================

name: Build Official OpenWrt

on:
  workflow_dispatch:

env:
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3 python3-pip python3-ply python3-setuptools rsync swig unzip zlib1g-dev file wget cpio rsync unzip file libelf-dev libfuse-dev libpam0g-dev libzstd-dev cups libcups2-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone Asia/Shanghai

    - name: Clone OpenWrt 24.10
      run: |
        git clone https://github.com/openwrt/openwrt -b openwrt-24.10 openwrt

    - name: Load custom feeds and config
      run: |
        cp config.txt openwrt/.config
        cp diy-part1.sh openwrt/
        cp diy-part2.sh openwrt/
        chmod +x openwrt/diy-part1.sh openwrt/diy-part2.sh
        cd openwrt
        ./diy-part1.sh
        ./diy-part2.sh
        
        # 强制勾选 CUPS 完整依赖链（先勾底层库，再勾上层包）
        ./scripts/config/conf -e CONFIG_PACKAGE_zlib
        ./scripts/config/conf -e CONFIG_PACKAGE_libpng
        ./scripts/config/conf -e CONFIG_PACKAGE_libjpeg-turbo
        ./scripts/config/conf -e CONFIG_PACKAGE_libusb-1.0
        ./scripts/config/conf -e CONFIG_PACKAGE_libpthread
        ./scripts/config/conf -e CONFIG_PACKAGE_cups
        ./scripts/config/conf -e CONFIG_PACKAGE_cups-filters
        ./scripts/config/conf -e CONFIG_PACKAGE_cups-bjnp
        ./scripts/config/conf -e CONFIG_PACKAGE_ghostscript
        ./scripts/config/conf -e CONFIG_PACKAGE_gutenprint
        ./scripts/config/conf -e CONFIG_PACKAGE_foomatic-db
        ./scripts/config/conf -e CONFIG_PACKAGE_foomatic-db-engine
        ./scripts/config/conf -e CONFIG_PACKAGE_avahi-daemon
        ./scripts/config/conf -e CONFIG_PACKAGE_dbus
        ./scripts/config/conf -e CONFIG_PACKAGE_luci-app-cupsd
        ./scripts/config/conf -e CONFIG_PACKAGE_ksmbd-server
        ./scripts/config/conf -e CONFIG_PACKAGE_luci-app-ksmbd
        ./scripts/config/conf -e CONFIG_PACKAGE_luci-app-ssr-plus
        ./scripts/config/conf -e CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Xray
        
        # defconfig 自动补齐所有剩余依赖
        make defconfig

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Remove conflicting packages
      run: |
        cd openwrt
        
        # 删除 smpackage 中与官方冲突的包
        rm -rf feeds/smpackage/{base-files,dnsmasq,firewall*,fullconenat,libnftnl,nftables,ppp,opkg,ucl,upx,vsftpd*,miniupnpd-iptables,wireless-regdb} 2>/dev/null || true
        
        # 删除有依赖问题的 onionshare-cli
        rm -rf feeds/packages/net/onionshare-cli 2>/dev/null || true
        find . -name "onionshare-cli" -type d -exec rm -rf {} \; 2>/dev/null || true
        for idx in feeds/*.index; do
          [ -f "$idx" ] && sed -i '/onionshare-cli/d' "$idx" || true
        done
        
        rm -rf tmp/
        echo "✅ 冲突包已清除"

    # ═══════════════════════════════════════
    # 第一道检查：依赖链是否能完整解析
    # ═══════════════════════════════════════
    - name: Verify package requirements
      run: |
        cd openwrt
        
        echo ""
        echo "╔══════════════════════════════════════╗"
        echo "║  🔍 第一道检查：依赖链完整性         ║"
        echo "╚══════════════════════════════════════╝"
        echo ""
        
        TOTAL=$(grep -c "^CONFIG_PACKAGE_.*=y" .config)
        echo "  已解析的包总数: $TOTAL"
        echo ""
        
        if [ "$TOTAL" -lt 50 ]; then
          echo "❌ 已解析的包少于 50 个，依赖解析可能失败"
          echo "   请检查："
          echo "   1. make defconfig 是否执行成功"
          echo "   2. feeds 源是否完整"
          echo "   3. .config 格式是否正确"
          # exit 1
        fi
        
        # 调试输出
        echo "========== .config 中 CUPS/ksmbd/SSR 相关行 =========="
        grep -i -E "CONFIG.*(cups|ksmbd|ssr)" .config 2>/dev/null || echo "无匹配"
        echo "========================================================"
        echo ""
        
        FAIL=0
        check_config() {
          local name="$1"
          local desc="${2:-}"
          if grep -q "^CONFIG_PACKAGE_${name}=y" .config 2>/dev/null; then
            echo "  ✅ $name ${desc:+($desc)}"
            return 0
          fi
          local alt=$(echo "$name" | sed 's/-/_/g')
          if grep -q "^CONFIG_PACKAGE_${alt}=y" .config 2>/dev/null; then
            echo "  ⚠️  $name → 实际包名: $alt ${desc:+($desc)}"
            return 0
          fi
          echo "  ❌ $name ${desc:+($desc)} - defconfig 后未解析到此包！"
          FAIL=1
          return 1
        }
        
        echo "【核心功能包依赖解析检查】"
        echo ""
        echo "  核心管理:"
        check_config "uhttpd" "Web管理界面"
        check_config "dropbear" "SSH服务"
        echo ""
        echo "  CUPS 打印:"
        check_config "cups" "CUPS核心"
        check_config "cupsd" "CUPS守护进程"
        check_config "cups-filters" "打印过滤器"
        echo ""
        echo "  文件共享:"
        check_config "ksmbd-server" "SMB共享服务"
        check_config "luci-app-ksmbd" "ksmbd管理界面"
        echo ""
        echo "  科学上网:"
        check_config "luci-app-ssr-plus" "SSR-Plus"
        echo ""
        echo "  实用工具:"
        check_config "luci-app-sqm" "SQM QoS"
        check_config "luci-app-upnp" "UPnP"
        check_config "luci-app-ddns" "动态DNS"
        check_config "luci-app-wol" "网络唤醒"
        check_config "wireguard-tools" "WireGuard"
        check_config "luci-proto-wireguard" "WireGuard界面"
        echo ""
        
        if [ "$FAIL" -eq 1 ]; then
          echo "╔══════════════════════════════════════╗"
          echo "║  ❌ 第一道检查失败                   ║"
          echo "║  核心包未被 defconfig 解析           ║"
          echo "║  请查看上方调试输出确认实际包名      ║"
          echo "╚══════════════════════════════════════╝"
          # exit 1
        else
          echo "╔══════════════════════════════════════╗"
          echo "║  ✅ 第一道检查通过                   ║"
          echo "║  解析包总数: $TOTAL                  ║"
          echo "║  ⏳ 即将开始下载...                   ║"
          echo "╚══════════════════════════════════════╝"
        fi

    - name: Download packages
      run: cd openwrt && make download -j8 || make download -j1 V=s

    # ═══════════════════════════════════════
    # 第二道检查：下载是否完整
    # ═══════════════════════════════════════
    - name: Verify downloads
      run: |
        cd openwrt
        
        echo ""
        echo "╔══════════════════════════════════════╗"
        echo "║  🔍 第二道检查：下载完整性           ║"
        echo "╚══════════════════════════════════════╝"
        echo ""
        
        FAIL=0
        
        check_dl() {
          local desc="${2:-}"
          if ls dl/$1* 2>/dev/null | head -1 | grep -q .; then
            echo "  ✅ $1 ${desc:+($desc)}"
          else
            echo "  ❌ $1 ${desc:+($desc)} - 未下载！"
            FAIL=1
          fi
        }
        
        echo "【核心组件】"
        check_dl "uhttpd" "Web管理"
        check_dl "dnsmasq" "DNS/DHCP"
        check_dl "dropbear" "SSH服务"
        check_dl "mbedtls" "加密库"
        echo ""
        
        echo "【CUPS 打印系统】"
        check_dl "cups" "CUPS核心"
        check_dl "cups-filters" "打印过滤器"
        check_dl "ghostscript" "PostScript"
        check_dl "gutenprint" "打印机驱动"
        check_dl "foomatic-db" "打印机数据库"
        check_dl "avahi" "打印机发现"
        echo ""
        
        echo "【文件共享】"
        check_dl "ksmbd" "SMB共享"
        echo ""
        
        echo "【实用工具】"
        check_dl "wireguard-tools" "WireGuard"
        check_dl "vlmcsd" "KMS激活"
        check_dl "curl" "URL工具"
        echo ""
        
        if [ "$FAIL" -eq 1 ]; then
          echo "╔══════════════════════════════════════╗"
          echo "║  ❌ 第二道检查失败                   ║"
          echo "║  有源码包下载缺失                    ║"
          echo "╚══════════════════════════════════════╝"
          exit 1
        fi
        
        echo "╔══════════════════════════════════════╗"
        echo "║  ✅ 第二道检查通过                   ║"
        echo "║  ⏳ 即将开始编译...                   ║"
        echo "╚══════════════════════════════════════╝"

    - name: Compile firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j8 || make -j1 V=s
        
        # ═══════════════════════════════════════
        # 第三道检查：固件内容验证
        # ═══════════════════════════════════════
        echo ""
        echo "╔══════════════════════════════════════╗"
        echo "║  🔍 第三道检查：固件内容验证         ║"
        echo "╚══════════════════════════════════════╝"
        echo ""
        FAIL=0
        FW="build_dir/target-x86_64_musl/root-x86"
        
        check_bin() {
          local desc="${2:-}"
          if [ -f "$FW/$1" ]; then
            echo "  ✅ $1 ${desc:+($desc)}"
          else
            echo "  ❌ $1 ${desc:+($desc)} - 未编译进固件！"
            FAIL=1
          fi
        }
        
        check_dir() {
          local desc="${2:-}"
          if [ -d "$FW/$1" ]; then
            echo "  ✅ $1/ ${desc:+($desc)}"
          else
            echo "  ❌ $1/ ${desc:+($desc)} - 目录缺失！"
            FAIL=1
          fi
        }
        
        echo "【核心系统】"
        check_bin "usr/sbin/uhttpd" "Web管理界面"
        check_bin "usr/sbin/dropbear" "SSH服务"
        check_bin "usr/sbin/dnsmasq" "DNS/DHCP"
        check_bin "usr/sbin/netifd" "网络管理"
        echo ""
        
        echo "【CUPS 打印系统】"
        check_bin "usr/sbin/cupsd" "CUPS守护进程"
        check_bin "usr/lib/cups/filter/gstoraster" "Ghostscript滤镜"
        check_dir "usr/share/cups" "CUPS数据目录"
        echo ""
        
        echo "【文件共享】"
        check_bin "usr/sbin/ksmbd.mountd" "ksmbd共享服务"
        check_dir "etc/ksmbd" "ksmbd配置"
        echo ""
        
        echo "【远程接入】"
        check_bin "usr/bin/wg" "WireGuard工具"
        echo ""
        
        echo "【LuCI 界面模块】"
        check_dir "usr/lib/lua/luci/controller" "LuCI控制器"
        check_dir "www/luci-static" "LuCI静态资源"
        echo ""
        
        echo "【实用工具】"
        check_bin "usr/bin/curl" "URL工具"
        check_bin "usr/bin/bash" "Bash Shell"
        check_bin "usr/sbin/vlmcsd" "KMS激活服务"
        echo ""
        
        if [ "$FAIL" -eq 1 ]; then
          echo "╔══════════════════════════════════════╗"
          echo "║  ❌ 第三道检查失败                   ║"
          echo "║  核心文件未编译进固件                ║"
          echo "╚══════════════════════════════════════╝"
          exit 1
        fi
        
        echo "╔══════════════════════════════════════╗"
        echo "║  ✅ 第三道检查通过                   ║"
        echo "║  所有核心文件已编入固件              ║"
        echo "╚══════════════════════════════════════╝"
        
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to Artifacts
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_Official_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to Release
      uses: softprops/action-gh-release@master
      if: steps.tag.outputs.status == 'success' && !cancelled()
      with:
        token: ${{ secrets.RELEASES_TOKEN }}
        tag_name: ${{ steps.tag.outputs.release_tag }}
        files: ${{ env.FIRMWARE }}/*

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASES_TOKEN }}
