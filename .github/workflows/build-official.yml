# ==========================================
# build-official.yml - OpenWrt 24.10 x86_64 编译
# ==========================================

name: Build OpenWrt 24.10

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装编译依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential asciidoc binutils bzip2 \
            gawk gettext git libncurses5-dev libz-dev patch python3 unzip zlib1g-dev \
            libelf-dev ecj fastjar procps file wget curl unzip rsync

      - name: 下载 OpenWrt SDK
        run: |
          cd /home/runner/work/openwrt-official-build/openwrt-official-build
          SDK_URL="https://downloads.openwrt.org/releases/24.10.0/openwrt-sdk-24.10.0-x86-64_gcc13.3.x_musl.Linux-x86_64.tar.xz"
          echo "正在下载 OpenWrt SDK..."
          wget -q --show-progress "$SDK_URL" -O openwrt-sdk.tar.xz
          echo "正在解压 SDK..."
          tar -xJf openwrt-sdk.tar.xz
          mv openwrt-sdk-* openwrt
          cd openwrt
          echo "SDK 目录: $(pwd)"
          ls -la

      - name: 配置 feeds
        run: |
          cd /home/runner/work/openwrt-official-build/openwrt-official-build/openwrt
          chmod +x /home/runner/work/openwrt-official-build/openwrt-official-build/diy-part1.sh
          /home/runner/work/openwrt-official-build/openwrt-official-build/diy-part1.sh

      - name: 合并 config
        run: |
          cd /home/runner/work/openwrt-official-build/openwrt-official-build/openwrt
          cat /home/runner/work/openwrt-official-build/openwrt-official-build/config.txt >> .config
          echo "config 合并完成"

      - name: 依赖检查
        run: |
          cd /home/runner/work/openwrt-official-build/openwrt-official-build/openwrt
          make defconfig
          echo "依赖检查完成"

      - name: 执行 diy-part2
        run: |
          cd /home/runner/work/openwrt-official-build/openwrt-official-build/openwrt
          chmod +x /home/runner/work/openwrt-official-build/openwrt-official-build/diy-part2.sh
          /home/runner/work/openwrt-official-build/openwrt-official-build/diy-part2.sh

      # ==========================================
      # 关键检查：验证中文语言包是否启用
      # ==========================================
      - name: 检查中文语言包是否启用
        run: |
          cd /home/runner/work/openwrt-official-build/openwrt-official-build/openwrt
          
          echo "===== 检查中文语言包 ====="
          
          # 必须存在的中文包列表
          REQUIRED_I18N_PACKAGES=(
            "luci-i18n-base-zh-cn"
            "luci-i18n-opkg-zh-cn"
            "luci-i18n-firewall-zh-cn"
            "luci-i18n-attendedsysupgrade-zh-cn"
            "luci-i18n-wireguard-zh-cn"
            "luci-i18n-upnp-zh-cn"
            "luci-i18n-ddns-zh-cn"
            "luci-i18n-sqm-zh-cn"
            "luci-i18n-wol-zh-cn"
            "luci-i18n-nft-qos-zh-cn"
            "luci-i18n-ttyd-zh-cn"
          )
          
          MISSING=0
          for pkg in "${REQUIRED_I18N_PACKAGES[@]}"; do
            if grep -q "^CONFIG_PACKAGE_${pkg}=y" .config; then
              echo "  ✅ $pkg"
            else
              echo "  ❌ 缺失: $pkg"
              MISSING=1
            fi
          done
          
          if [ $MISSING -eq 1 ]; then
            echo ""
            echo "===== 错误: 中文语言包缺失！ ====="
            echo "请检查 config.txt 是否包含所有必要的 CONFIG_PACKAGE_luci-i18n-*-zh-cn=y"
            exit 1
          fi
          
          echo "===== 所有中文语言包已启用 ====="

      - name: 检查中文设置文件
        run: |
          cd /home/runner/work/openwrt-official-build/openwrt-official-build/openwrt
          
          echo "===== 检查中文设置文件 ====="
          
          if [ -f "files/etc/uci-defaults/99-lang-zh-cn" ]; then
            echo "  ✅ files/etc/uci-defaults/99-lang-zh-cn 存在"
            echo "内容:"
            cat files/etc/uci-defaults/99-lang-zh-cn
          else
            echo "  ❌ 错误: files/etc/uci-defaults/99-lang-zh-cn 不存在！"
            echo "diy-part2.sh 可能没有正确执行 cd openwrt"
            exit 1
          fi
          
          echo "===== 中文设置文件检查完成 ====="

      - name: Force enable key packages
        run: |
          cd /home/runner/work/openwrt-official-build/openwrt-official-build/openwrt
          
          enable_pkg() {
            local pattern="$1"
            if grep -q "^# CONFIG_PACKAGE_${pattern} is not set" .config; then
              sed -i "s/^# CONFIG_PACKAGE_${pattern} is not set/CONFIG_PACKAGE_${pattern}=y/" .config
              echo "  强制启用: $pattern"
            elif grep -q "^CONFIG_PACKAGE_${pattern}=y" .config; then
              echo "  已启用: $pattern"
            else
              echo "CONFIG_PACKAGE_${pattern}=y" >> .config
              echo "  追加启用: $pattern"
            fi
          }
          
          echo "【强制启用中文语言包】"
          enable_pkg "luci-i18n-base-zh-cn"
          enable_pkg "luci-i18n-opkg-zh-cn"
          enable_pkg "luci-i18n-firewall-zh-cn"
          enable_pkg "luci-i18n-attendedsysupgrade-zh-cn"
          enable_pkg "luci-i18n-wireguard-zh-cn"
          enable_pkg "luci-i18n-upnp-zh-cn"
          enable_pkg "luci-i18n-ddns-zh-cn"
          enable_pkg "luci-i18n-sqm-zh-cn"
          enable_pkg "luci-i18n-wol-zh-cn"
          enable_pkg "luci-i18n-nft-qos-zh-cn"
          enable_pkg "luci-i18n-ttyd-zh-cn"
          
          echo "【强制启用其他必要包】"
          enable_pkg "luci-ssl"
          enable_pkg "luci"
          enable_pkg "ksmbd-server"
          enable_pkg "miniupnpd-iptables"
          enable_pkg "ddns-scripts"

      - name: 编译固件
        run: |
          cd /home/runner/work/openwrt-official-build/openwrt-official-build/openwrt
          
          echo "===== 开始编译 ====="
          make -j$(nproc) V=s
          
          echo "===== 编译完成 ====="

      - name: 列出固件文件
        run: |
          cd /home/runner/work/openwrt-official-build/openwrt-official-build/openwrt
          echo "===== 固件文件列表 ====="
          find bin/targets/x86/64 -name "*.img.gz" -o -name "*.bin" | head -20
          ls -lh bin/targets/x86/64/

      - name: 上传到 Releases
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          cd /home/runner/work/openwrt-official-build/openwrt-official-build/openwrt
          
          # 安装 GitHub CLI
          sudo apt-get install -y gh
          
          # 设置 Git 身份
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 创建 tag
          TAG="v24.10.$(date +%Y%m%d%H%M%S)"
          git tag -a "$TAG" -m "OpenWrt 24.10 auto build"
          git push origin "$TAG"
          
          # 上传到 Release
          gh release create "$TAG" \
            --title "OpenWrt 24.10 x86_64 $(date +%Y-%m-%d)" \
            --body "自动构建版本" \
            $(find bin/targets/x86/64 -name "*.img.gz" -o -name "*.bin") || true
