name: Build OpenWrt 24.10 Official

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

permissions:
  contents: write

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-24.10
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    # 安装编译依赖
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential clang flex bison g++ gawk gcc-multilib gettext \
          git libncurses-dev libssl-dev python3-pip python3-setuptools \
          rsync swig unzip zlib1g-dev file wget xsltproc \
          ecj java-propose-classpath libelf-dev libfuse-dev libjson-c-dev \
          liblzo2-dev liblzma-dev libzstd-dev quilt u-boot-tools \
          python3-dev python3-pyelftools python3-yaml ccache \
          aria2 curl subversion \
          libdbus-1-dev libexpat1-dev libglib2.0-dev \
          bash-completion
        sudo apt-get clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    # 克隆OpenWrt源码
    - name: Clone source code
      working-directory: /workdir
      run: |
        git clone -b ${{ env.REPO_BRANCH }} --single-branch --depth 1 ${{ env.REPO_URL }} openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    # 缓存下载文件
    - name: Cache OpenWrt dl (downloads)
      uses: actions/cache@v4
      with:
        path: /workdir/openwrt/dl
        key: openwrt-dl-24.10-${{ hashFiles('diy-part1.sh') }}-${{ github.run_id }}
        restore-keys: |
          openwrt-dl-24.10-${{ hashFiles('diy-part1.sh') }}-
          openwrt-dl-24.10-

    # 配置第三方feeds源
    - name: Load custom feeds
      run: |
        chmod +x diy-part1.sh
        cd openwrt
        $GITHUB_WORKSPACE/diy-part1.sh

    # 缓存编译目录
    - name: Cache OpenWrt build (staging_dir)
      uses: actions/cache@v4
      with:
        path: |
          /workdir/openwrt/staging_dir
          /workdir/openwrt/build_dir
        key: openwrt-build-24.10-${{ hashFiles('config.txt') }}-${{ github.run_id }}
        restore-keys: |
          openwrt-build-24.10-${{ hashFiles('config.txt') }}-
          openwrt-build-24.10-

    # 更新feeds
    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    # 安装feeds
    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    # 加载自定义配置
    - name: Load custom configuration
      run: |
        [ -e config.txt ] && cp config.txt openwrt/.config
        chmod +x diy-part2.sh
        cd openwrt
        $GITHUB_WORKSPACE/diy-part2.sh

    # SSH调试（可选）
    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: github.event.inputs.ssh == 'true'

    # 清理Tailscale缓存
    - name: Clean Go mod cache
      run: |
        cd openwrt
        rm -rf dl/go-mod-cache
        make package/tailscale/clean 2>/dev/null || true

    # 下载源码包 + defconfig
    - name: Download package
      run: |
        cd openwrt
        make defconfig
        # 强制禁用dnsmasq，使用dnsmasq-full（解决冲突）
        sed -i 's/CONFIG_PACKAGE_dnsmasq=y/# CONFIG_PACKAGE_dnsmasq is not set/' .config
        sed -i 's/CONFIG_PACKAGE_dnsmasq=m/# CONFIG_PACKAGE_dnsmasq is not set/' .config
        make defconfig
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    # CUPS 汉化集成（编译前替换源码中的模板）
    - name: Integrate CUPS Chinese localization
      run: |
        cd openwrt
        
        if [ -f "$GITHUB_WORKSPACE/CUPS_2.3.1_zh_CN.zip" ]; then
            echo "集成CUPS中文汉化..."
            unzip -o $GITHUB_WORKSPACE/CUPS_2.3.1_zh_CN.zip -d /tmp/cups-zh
            
            # 替换 printing feed 中的 cups 模板
            if [ -d "feeds/printing/cups" ]; then
                # 找到 cups 源码中的 templates 目录并替换
                for tmpl_dir in $(find feeds/printing -name "templates" -type d 2>/dev/null); do
                    if [ -d "$tmpl_dir" ]; then
                        cp -r /tmp/cups-zh/zh_CN/* "$tmpl_dir/" 2>/dev/null || true
                        echo "  - 已替换: $tmpl_dir"
                    fi
                done
            fi
            
            # 集成首页到 base-files（首页不冲突）
            mkdir -p package/base-files/files/usr/share/cups/doc-root
            cp /tmp/cups-zh/index.html package/base-files/files/usr/share/cups/doc-root/ 2>/dev/null || true
            chmod -R 755 package/base-files/files/usr/share/cups/doc-root
            
            rm -rf /tmp/cups-zh
            echo "CUPS汉化集成完成"
        else
            echo "警告: 未找到CUPS_2.3.1_zh_CN.zip，跳过汉化"
        fi

    # 编译固件
    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 || make -j1 V=s | tee build.log
        echo "status=success" >> "$GITHUB_OUTPUT"
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> "$GITHUB_ENV"
        echo "FILE_DATE=_$(date +%Y%m%d%H%M)" >> "$GITHUB_ENV"

    # 上传固件
    - name: Upload firmware
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_24.10_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin/targets/*/*

    # 创建Git标签
    - name: Create Tag
      if: steps.compile.outputs.status == 'success'
      run: |
        git config --local user.name "GitHub Actions"
        git config --local user.email "actions@github.com"
        TAG_NAME="v24.10-stable-$(date +%Y%m%d)"
        git tag -a "$TAG_NAME" -m "OpenWrt 24.10 Stable Build $(date +%Y.%m.%d)"
        git push origin "$TAG_NAME"
