name: OpenWrt 24.10 x86_64 Build

on:
  repository_dispatch:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3 python3-pip python3-ply python3-setuptools rsync swig unzip zlib1g-dev file wget cpio rsync unzip file libelf-dev libfuse-dev libpam0g-dev libzstd-dev
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone Asia/Shanghai

      - name: Clone OpenWrt 24.10
        run: |
          git clone https://github.com/openwrt/openwrt -b openwrt-24.10 openwrt

      - name: Update feeds
        run: |
          cd openwrt
          echo "【执行 diy-part1.sh 配置 Feed 源】"
          bash ../diy-part1.sh
          echo "【更新 feeds】"
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          echo "【修复 printing 源 Makefile 兼容性问题】"
          # ghostscript: 修复 PKG_SOURCE_URL 中的 $(PKG-SOURCE) 拼写错误
          sed -i 's/\$(PKG-SOURCE)/\$(PKG_SOURCE)/g' feeds/printing/ghostscript/Makefile 2>/dev/null || true
          # qpdf: 将 libpcre 依赖改为 libpcre2（OpenWrt 24.10 已移除 libpcre）
          sed -i 's/+libpcre/+libpcre2/g' feeds/printing/qpdf/Makefile 2>/dev/null || true
          # openprinting-cups-filters: 修复 preinst/postinst 缺少包名前缀
          sed -i 's/^define Package\/preinst$/define Package\/openprinting-cups-filters\/preinst/' feeds/printing/openprinting-cups-filters/Makefile 2>/dev/null || true
          sed -i 's/^define Package\/postinst$/define Package\/openprinting-cups-filters\/postinst/' feeds/printing/openprinting-cups-filters/Makefile 2>/dev/null || true
          echo "  Makefile 修复完成"

      - name: Load custom configuration
        run: |
          cd openwrt
          echo "【应用 config.txt 配置】"
          cp ../config.txt .config
          echo "【执行 diy-part2.sh 自定义脚本】"
          bash ../diy-part2.sh

      - name: Generate default configuration
        run: |
          cd openwrt
          echo "【生成 defconfig】"
          make defconfig

      - name: Force enable packages and verify configuration
        run: |
          cd openwrt

          # 定义强制启用函数
          enable_pkg() {
              grep -q "CONFIG_PACKAGE_$1=y" .config || echo "CONFIG_PACKAGE_$1=y" >> .config
          }

          # =============================================
          # Step 1: 强制启用 LuCI 核心依赖
          # =============================================
          echo "【强制启用 LuCI 核心依赖】"
          enable_pkg "luci-base"
          enable_pkg "luci-mod-admin-full"
          enable_pkg "luci-mod-network"
          enable_pkg "luci-mod-status"
          enable_pkg "luci-mod-system"
          enable_pkg "rpcd"
          enable_pkg "rpcd-mod-file"
          enable_pkg "rpcd-mod-iwinfo"
          enable_pkg "rpcd-mod-rpcsys"
          enable_pkg "rpcd-mod-rrdns"
          enable_pkg "uhttpd"
          enable_pkg "uhttpd-mod-ubus"
          enable_pkg "cgi-io"
          enable_pkg "ucode"
          enable_pkg "ucode-mod-fs"
          enable_pkg "ucode-mod-math"
          enable_pkg "ucode-mod-nl80211"
          enable_pkg "ucode-mod-resolv"
          enable_pkg "ucode-mod-ubus"
          enable_pkg "ucode-mod-uci"
          enable_pkg "luci-theme-bootstrap"

          # LuCI 中文翻译包
          enable_pkg "luci-i18n-base-zh-cn"
          enable_pkg "luci-i18n-opkg-zh-cn"
          enable_pkg "luci-i18n-firewall-zh-cn"
          enable_pkg "luci-i18n-attendedsysupgrade-zh-cn"
          enable_pkg "luci-i18n-wireguard-zh-cn"
          enable_pkg "luci-i18n-upnp-zh-cn"
          enable_pkg "luci-i18n-ddns-zh-cn"
          enable_pkg "luci-i18n-sqm-zh-cn"
          enable_pkg "luci-i18n-wol-zh-cn"
          enable_pkg "luci-i18n-nft-qos-zh-cn"
          enable_pkg "luci-i18n-ttyd-zh-cn"
          enable_pkg "luci-i18n-ssr-plus-zh-cn"
          enable_pkg "luci-i18n-cupsd-zh-cn"

          # =============================================
          # Step 2: 强制启用 CUPS 打印包
          # =============================================
          echo "【强制启用 CUPS 打印系统】"
          enable_pkg "cups"
          enable_pkg "cups-bjnp"
          enable_pkg "ghostscript"
          enable_pkg "splix"
          enable_pkg "luci-app-cupsd"
          enable_pkg "avahi-dbus-daemon"
          enable_pkg "dbus"

          # =============================================
          # Step 3: 强制启用文件共享
          # =============================================
          echo "【强制启用文件共享】"
          enable_pkg "ksmbd"
          enable_pkg "ksmbd-utils"

          # =============================================
          # Step 4: 强制启用 SSR-Plus
          # =============================================
          echo "【强制启用 SSR-Plus】"
          enable_pkg "luci-app-ssr-plus"
          enable_pkg "xray-core"

          # =============================================
          # Step 5: 强制启用工具包
          # =============================================
          echo "【强制启用工具包】"
          enable_pkg "curl"
          enable_pkg "bash"
          enable_pkg "vlmcsd"
          enable_pkg "htop"
          enable_pkg "iperf3"
          enable_pkg "cfdisk"
          enable_pkg "e2fsprogs"

          # =============================================
          # Step 6: 强制启用网络工具
          # =============================================
          echo "【强制启用网络工具】"
          enable_pkg "luci-app-wireguard"
          enable_pkg "wireguard-tools"
          enable_pkg "miniupnpd"
          enable_pkg "luci-app-upnp"
          enable_pkg "ddns-scripts"
          enable_pkg "luci-app-ddns"
          enable_pkg "sqm-scripts"
          enable_pkg "luci-app-sqm"
          enable_pkg "luci-app-wol"
          enable_pkg "luci-app-nft-qos"
          enable_pkg "luci-app-ttyd"
          enable_pkg "luci-app-attendedsysupgrade"

          # =============================================
          # Step 7: GRUB 超时修正
          # =============================================
          echo "【修正 GRUB 超时】"
          sed -i 's/CONFIG_GRUB_TIMEOUT=.*/CONFIG_GRUB_TIMEOUT=0/' .config
          sed -i 's/CONFIG_GRUB_TIMEOUT_MINIMUM=.*/CONFIG_GRUB_TIMEOUT_MINIMUM=0/' .config

          # =============================================
          # Step 8: 禁用 mosdns（Go 版本不兼容）
          # =============================================
          echo "【禁用 mosdns（Go 版本不兼容）】"
          sed -i 's/CONFIG_PACKAGE_mosdns=y/# CONFIG_PACKAGE_mosdns is not set/' .config

          # =============================================
          # Step 9: 最终验证
          # =============================================
          echo ""
          echo "=========================================="
          echo "【最终配置验证】"
          echo "=========================================="

          ERROR=0

          # LuCI 核心
          echo ""
          echo "--- LuCI 核心检查 ---"
          for pkg in luci-base luci-mod-admin-full luci-mod-network luci-mod-status luci-mod-system \
                     rpcd rpcd-mod-file rpcd-mod-iwinfo rpcd-mod-rpcsys rpcd-mod-rrdns \
                     uhttpd uhttpd-mod-ubus cgi-io \
                     ucode ucode-mod-fs ucode-mod-math ucode-mod-nl80211 ucode-mod-resolv ucode-mod-ubus ucode-mod-uci \
                     luci-theme-bootstrap \
                     luci-i18n-base-zh-cn luci-i18n-opkg-zh-cn luci-i18n-firewall-zh-cn \
                     luci-i18n-attendedsysupgrade-zh-cn luci-i18n-wireguard-zh-cn luci-i18n-upnp-zh-cn \
                     luci-i18n-ddns-zh-cn luci-i18n-sqm-zh-cn luci-i18n-wol-zh-cn \
                     luci-i18n-nft-qos-zh-cn luci-i18n-ttyd-zh-cn luci-i18n-ssr-plus-zh-cn luci-i18n-cupsd-zh-cn; do
              if grep -q "CONFIG_PACKAGE_${pkg}=y" .config; then
                  echo "  OK $pkg"
              else
                  echo "  MISSING $pkg"
                  ERROR=1
              fi
          done

          # CUPS 打印
          echo ""
          echo "--- CUPS 打印系统检查 ---"
          for pkg in cups cups-bjnp ghostscript splix luci-app-cupsd avahi-dbus-daemon dbus; do
              if grep -q "CONFIG_PACKAGE_${pkg}=y" .config; then
                  echo "  OK $pkg"
              else
                  echo "  MISSING $pkg"
                  ERROR=1
              fi
          done

          # 文件共享
          echo ""
          echo "--- 文件共享检查 ---"
          for pkg in ksmbd ksmbd-utils; do
              if grep -q "CONFIG_PACKAGE_${pkg}=y" .config; then
                  echo "  OK $pkg"
              else
                  echo "  MISSING $pkg"
                  ERROR=1
              fi
          done

          # SSR-Plus
          echo ""
          echo "--- SSR-Plus 检查 ---"
          for pkg in luci-app-ssr-plus xray-core; do
              if grep -q "CONFIG_PACKAGE_${pkg}=y" .config; then
                  echo "  OK $pkg"
              else
                  echo "  MISSING $pkg"
                  ERROR=1
              fi
          done

          # 网络
          echo ""
          echo "--- 网络工具检查 ---"
          for pkg in luci-app-wireguard wireguard-tools miniupnpd luci-app-upnp \
                     ddns-scripts luci-app-ddns sqm-scripts luci-app-sqm \
                     luci-app-wol luci-app-nft-qos luci-app-ttyd luci-app-attendedsysupgrade; do
              if grep -q "CONFIG_PACKAGE_${pkg}=y" .config; then
                  echo "  OK $pkg"
              else
                  echo "  MISSING $pkg"
                  ERROR=1
              fi
          done

          # 工具
          echo ""
          echo "--- 工具包检查 ---"
          for pkg in curl bash vlmcsd htop iperf3 cfdisk e2fsprogs; do
              if grep -q "CONFIG_PACKAGE_${pkg}=y" .config; then
                  echo "  OK $pkg"
              else
                  echo "  MISSING $pkg"
                  ERROR=1
              fi
          done

          # GRUB
          echo ""
          echo "--- GRUB 超时检查 ---"
          if grep -q "CONFIG_GRUB_TIMEOUT=0" .config; then
              echo "  OK GRUB_TIMEOUT=0"
          else
              echo "  MISSING GRUB_TIMEOUT not set to 0!"
              ERROR=1
          fi

          # rootfs
          echo ""
          echo "--- RootFS 大小检查 ---"
          if grep -q "CONFIG_TARGET_ROOTFS_PARTSIZE=512" .config; then
              echo "  OK ROOTFS_PARTSIZE=512"
          else
              echo "  MISSING ROOTFS_PARTSIZE not set!"
              ERROR=1
          fi

          echo ""
          echo "=========================================="
          if [ "$ERROR" = "1" ]; then
              echo "FAILED: Configuration verification failed!"
              echo "=========================================="
              exit 1
          else
              echo "PASSED: All configuration checks passed!"
              echo "=========================================="
          fi

          # 重新生成 defconfig 以确保配置一致
          echo "【重新生成 defconfig】"
          make defconfig

      - name: Download package sources
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: Compile firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-24.10-x86_64
          path: openwrt/bin/targets/x86/64/
